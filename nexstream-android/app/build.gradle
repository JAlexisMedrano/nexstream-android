plugins {
    id 'com.android.application'
}

android {
    namespace 'com.nexstream.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.nexstream.app"
        minSdk 21          // Android 5.0 — cubre casi todos los Android TV
        targetSdk 34
        versionCode 1
        versionName "5.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Para firmar: configurar signingConfig aquí
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    // No necesita más dependencias — el WebView es parte del sistema Android
}
